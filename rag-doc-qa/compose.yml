##
## RAG Document Q&A — podman-compose
## Usage: podman-compose up -d
## Then open http://localhost:8501
##

version: "3.9"

services:
  # ── Local LLM via Ollama ───────────────────────────────────
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (uncomment if you have NVIDIA GPU):
    # devices:
    #   - nvidia.com/gpu=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Pull the default model on first run ────────────────────
  ollama-pull:
    image: docker.io/ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "granite3.1-dense:8b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Streamlit RAG App ──────────────────────────────────────
  rag-app:
    build:
      context: .
      dockerfile: Containerfile
    container_name: rag-doc-qa
    ports:
      - "8501:8501"
    volumes:
      - rag_data:/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=granite3.1-dense:8b
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  rag_data:
